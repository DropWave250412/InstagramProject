    <!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #111827
    );
    overflow:hidden;
}

.login-box{
    width:380px;
    padding:35px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    box-shadow:
    0 0 30px rgba(0,255,255,.15),
    0 0 60px rgba(0,255,255,.1);
    text-align:center;
}

.login-box h1{
    color:#00ffff;
    margin-bottom:25px;
    font-size:30px;
    text-shadow:0 0 15px #00ffff;
}

.login-box input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:15px;
}

.login-box input::placeholder{
    color:#cbd5e1;
}

.login-box button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#00ffff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.login-box button:hover{
    transform:scale(1.04);
    box-shadow:0 0 20px #00ffff;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:20px;
    font-size:14px;
}

.bg-glow{
    position:absolute;
    width:400px;
    height:400px;
    background:#00ffff;
    filter:blur(180px);
    opacity:.15;
    z-index:-1;
}
</style>
</head>
<body>
    <div class="bg-glow"></div>
<div class="login-box">

    <h1>⚡ ADMIN ACCESS</h1>

    <p class="subtitle">
        Secure Control Panel
    </p>

    <input
    id="username"
    placeholder="Username">

    <input
    id="password"
    type="password"
    placeholder="Password">

    <button onclick="login()">
        LOGIN
    </button>

</div>

<script>

async function login() {

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    const response =
    await fetch("/admin-login", {

        method: "POST",

        headers: {
            "Content-Type":
            "application/json"
        },

        body: JSON.stringify({
            username,
            password
        })

    });

    const data =
    await response.json();

    if (data.success) {

        window.location.href =
        "/admin";

    } else {

        alert(
        "Wrong Username Or Password"
        );

    }

}

</script>

</body>
</html>
